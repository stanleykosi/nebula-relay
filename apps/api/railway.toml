[build]
builder = "RAILPACK"
buildCommand = "corepack enable && corepack prepare pnpm@9.15.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @nebula/api... build && cargo build -p nebula-host --release"
watchPatterns = [
  "/apps/api/**",
  "/packages/**",
  "/risc0/**",
  "/Cargo.toml",
  "/Cargo.lock",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/railpack.json",
  "/contracts/stellar/**"
]

[deploy]
startCommand = "pnpm --filter @nebula/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
