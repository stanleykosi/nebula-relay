[build]
builder = "RAILPACK"
buildCommand = "bash scripts/railway_build_api.sh"
watchPatterns = [
  "/apps/api/**",
  "/packages/**",
  "/risc0/**",
  "/Cargo.toml",
  "/Cargo.lock",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/railpack.json",
  "/scripts/railway_build_api.sh",
  "/contracts/stellar/**"
]

[deploy]
startCommand = "pnpm --filter @nebula/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
